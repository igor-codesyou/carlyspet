<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Carly's Pet leva cuidado profissional até a sua porta. Banho, tosa e atenção exclusiva para o seu pet — sem estresse, sem deslocamento, na comodidade da sua casa."
    />
    <!-- ============================================
               PRECONNECT
      ============================================ -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Gilda+Display&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
      rel="stylesheet"
    />

    <!-- ============================================
    SWIPER JS
      ============================================ -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/swiper@12/swiper-bundle.min.css"
    />

    <!-- ============================================
          LINKS
      ============================================ -->
    <link rel="stylesheet" href="assets/styles/global.css" />
    <link rel="stylesheet" href="assets/styles/index.css" />

    <script src="app.js" defer></script>

    <!-- ============================================
          TITLE
      ============================================ -->

    <title>Carly's Pet — Banho, Tosa e Cuidados em Domicílio | São Paulo</title>
  </head>

  <body>
    <!-- ============================================
    HEADER
      ============================================ -->

    <header class="header blur" data-header>
      <div class="container">
        <nav class="header-nav">
          <a href="./index.html" class="logo">
            <img src="assets/images/logo.svg" alt="Logo da Carly's Pet" />
            <span>Carly's Pet</span>
          </a>

          <button class="toggle" data-menu>
            <img src="assets/images/svg/menu.svg" alt="" />
          </button>

          <div class="navigation open" data-nav>
            <ul class="list-items">
              <li class="item">
                <a href="#home" data-link>Início</a>
              </li>

              <li class="item">
                <a href="#diferencial" data-link>Diferenciais</a>
              </li>

              <li class="item">
                <a href="#services" data-link>Serviços</a>
              </li>

              <li class="item">
                <a href="#about" data-link>Quem sou</a>
              </li>
            </ul>

            <a href="#" class="main-button">Agendar</a>
          </div>
        </nav>
      </div>
    </header>

    <!-- ============================================
    INÍCIO
      ============================================ -->

    <section class="home">
      <div class="container content">
        <div class="main-box">
          <h1 class="h1">Seu pet feliz começa aqui</h1>

          <div class="right-side">
            <p>
              Ele chega estressado, sai tranquilo. Você acompanha cada momento,
              do transporte seguro até o último toque de cuidado que faz
              diferença real.
            </p>

            <div class="button-box">
              <a href="#" class="main-button">Agendar</a>
              <a href="#" class="outlined-button">Ver serviços</a>
            </div>
          </div>
        </div>

        <img
          class="hero-image"
          src="assets/images/hero-image.webp"
          alt="Mulher com cachorro"
          width="2560"
          height="1440"
        />
      </div>
    </section>

    <!-- ============================================
    DIFERENCIAIS
    ============================================ -->
  </body>
</html>
